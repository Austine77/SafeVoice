<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFEVOICE Staff Portal</title>
<style>
  body {margin:0;font-family:Arial,sans-serif;background-color:#2b1148;color:#fff;display:flex;flex-direction:column;min-height:100vh;}
  header{text-align:center;padding:20px;border:2px solid #fff;border-radius:16px;width:320px;margin:40px auto 60px auto;}
  header h1{margin:0;font-size:28px;font-weight:bold;}
  header p{margin:5px 0 0;font-size:16px;}
  main{flex:1;display:flex;justify-content:center;align-items:center;gap:60px;flex-wrap:wrap;position:relative;}

  .icon-card {width:140px;height:140px;border-radius:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;transition:all 0.3s ease;text-align:center;}
  .icon-card h3 {margin:10px 0 0;font-size:18px;}

  #adminIcon {background-color:#1a1a72;border:2px solid #fff;}
  #workerIcon {background-color:#4b1f78;border:2px solid #fff;}
  .icon-card:hover {transform:scale(1.05);}

  #loginForm {display:none;flex-direction:column;align-items:center;background:#3a145f;padding:30px;border-radius:20px;width:320px;box-shadow:0 8px 20px rgba(0,0,0,0.5);}
  #loginForm h2 {margin-top:0;font-size:22px;}
  #loginForm input {width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;font-size:16px;}
  #loginForm button {width:100%;padding:12px;border:none;border-radius:10px;background:#24c3b5;color:#1b1030;font-weight:bold;cursor:pointer;font-size:16px;}
  #loginForm p {margin:10px 0 0;color:#ffb3b3;font-weight:bold;}

  footer{text-align:center;padding:15px;background-color:#200b38;border-top-left-radius:16px;border-top-right-radius:16px;font-size:14px;margin-top:auto;}
  @media(max-width:500px){main{flex-direction:column;gap:30px;}}
</style>
</head>
<body>
<header>
  <h1>SAFEVOICE</h1>
  <p>Staff portal access</p>
</header>
<main>
  <div id="portalIcons" style="display:flex;gap:40px;">
    <div class="icon-card" id="adminIcon">
      <div style="font-size:40px;color:#fff;">🛡</div>
      <h3>Admin</h3>
    </div>
    <div class="icon-card" id="workerIcon">
      <div style="font-size:40px;color:#fff;">👤</div>
      <h3>Social Worker</h3>
    </div>
  </div>

  <div id="loginForm">
    <h2 id="formTitle">Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Sign In</button>
    <p id="loginError"></p>
    <button id="backBtn" style="margin-top:10px;background:#dc6f8a;color:#fff;">Back</button>
  </div>
</main>
<footer>
  © 2026 Abuse Report Platform. All rights reserved.
</footer>
<script>
const API_BASE = location.origin.includes('localhost') ? 'http://localhost:5000/api' : `${location.origin}/api`;
let currentRole = null;
const portalIcons = document.getElementById('portalIcons');
const loginForm = document.getElementById('loginForm');
const formTitle = document.getElementById('formTitle');
const loginError = document.getElementById('loginError');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');

function showLogin(role){
  currentRole = role;
  portalIcons.style.display='none';
  loginForm.style.display='flex';
  formTitle.textContent = role==='admin' ? 'Admin Login' : 'Social Worker Login';
  loginError.textContent='';
}
function backToPortal(){
  loginForm.style.display='none';
  portalIcons.style.display='flex';
  usernameInput.value='';
  passwordInput.value='';
}

document.getElementById('adminIcon').onclick = ()=>showLogin('admin');
document.getElementById('workerIcon').onclick = ()=>showLogin('worker');
document.getElementById('backBtn').onclick = backToPortal;

document.getElementById('loginBtn').onclick=async()=>{
  const username=usernameInput.value.trim();
  const password=passwordInput.value.trim();
  if(!username||!password){loginError.textContent='Enter username and password.';return;}
  loginError.textContent='Signing in...';
  try{
    const res = await fetch(`${API_BASE}/auth/${currentRole}/login`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.message || 'Login failed');

    // Dynamically load dashboard content for correct role
    portalIcons.style.display='none';
    loginForm.style.display='flex';
    if(currentRole==='admin'){
      loginForm.innerHTML=`<h2>Admin Dashboard</h2><p>Welcome, Admin! Cases and metrics loaded from backend.</p><button onclick="location.reload()">Logout</button>`;
    }else{
      loginForm.innerHTML=`<h2>Social Worker Dashboard</h2><p>Welcome, Social Worker! Assigned cases loaded from backend.</p><button onclick="location.reload()">Logout</button>`;
    }
  }catch(e){loginError.textContent=e.message;}
};
</script>
</body>
</html>
